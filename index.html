<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CRM — Comercializadora Arcángel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ============ PANTALLA DE LOGIN ============ -->
<div id="vistaLogin" class="login">
  <div class="login__card">
    <div class="login__brand">
      <svg width="34" height="40" viewBox="0 0 60 72" fill="none" aria-hidden="true">
        <path d="M30 2 C18 10, 10 22, 14 38 C16 46, 22 52, 30 56 C24 50, 20 42, 22 34 C24 40, 28 46, 34 50 C30 42, 28 32, 32 24 C34 32, 38 38, 42 42 C40 30, 38 16, 30 2 Z" fill="#E7A142"/>
      </svg>
      <div class="login__brand-text">
        <span class="login__brand-eyebrow">Comercializadora</span>
        <span class="login__brand-name">Arcángel</span>
      </div>
    </div>
    <h1 class="login__title">Ingresa al CRM</h1>
    <p class="login__sub">Gestión de ventas, inventario y despachos</p>

    <form id="formLogin" class="login__form">
      <label class="login__label" for="loginEmail">Correo</label>
      <input class="login__input" type="email" id="loginEmail" placeholder="tucorreo@ejemplo.com" required autocomplete="username">

      <label class="login__label" for="loginPass">Contraseña</label>
      <input class="login__input" type="password" id="loginPass" placeholder="••••••••" required autocomplete="current-password">

      <p id="loginError" class="login__error" hidden></p>

      <button type="submit" class="btn btn--primary login__submit" id="btnLogin">Ingresar</button>
    </form>
  </div>
</div>

<!-- ============ APP PRINCIPAL (oculta hasta iniciar sesión) ============ -->
<div id="vistaApp" class="app" hidden>

  <!-- Sidebar de escritorio -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <svg width="24" height="29" viewBox="0 0 60 72" fill="none" aria-hidden="true">
        <path d="M30 2 C18 10, 10 22, 14 38 C16 46, 22 52, 30 56 C24 50, 20 42, 22 34 C24 40, 28 46, 34 50 C30 42, 28 32, 32 24 C34 32, 38 38, 42 42 C40 30, 38 16, 30 2 Z" fill="#E7A142"/>
      </svg>
      <div class="sidebar__brand-text">
        <span class="sidebar__brand-eyebrow">Comercializadora</span>
        <span class="sidebar__brand-name">Arcángel</span>
      </div>
    </div>

    <nav class="sidebar__nav" id="sidebarNav"></nav>

    <div class="sidebar__user">
      <div class="sidebar__user-info">
        <span class="sidebar__user-name" id="nombreUsuario">—</span>
        <span class="sidebar__user-role" id="rolUsuario">—</span>
      </div>
      <button id="btnLogout" class="sidebar__logout" aria-label="Cerrar sesión" title="Cerrar sesión">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </aside>

  <!-- Barra superior móvil -->
  <header class="topbar-mobile">
    <button id="btnMenuMobile" class="topbar-mobile__menu-btn" aria-label="Abrir menú">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <span class="topbar-mobile__title" id="tituloMobile">Dashboard</span>
    <div style="width:22px"></div>
  </header>

  <!-- Navegación inferior móvil -->
  <nav class="bottombar-mobile" id="bottombarMobile"></nav>

  <!-- Contenido principal -->
  <main class="contenido" id="contenido">
    <div id="vistaContenido"></div>
  </main>
</div>

<!-- ============ TOAST de notificaciones ============ -->
<div id="toast" class="toast" hidden></div>

<script src="config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/ventas.js"></script>
<script src="js/inventario.js"></script>
<script src="js/pedidos.js"></script>
<script src="js/despacho.js"></script>
<script src="js/facturacion.js"></script>
<script src="js/app.js"></script>
</body>
</html>
